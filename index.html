<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050505"><title>Kings Music</title><link rel="manifest" href="manifest.json?v=6.1"><link rel="apple-touch-icon" href="assets/icons/icon-180.png?v=6.1"><link rel="icon" href="assets/icons/icon-192.png?v=6.1"><link rel="stylesheet" href="style.css?v=6.1"></head><body><div class="app"><header><button class="brand" data-tab="home"><img src="assets/logo.png?v=6.1" alt=""><span><b>Kings Music</b><small>KingJJ catalog</small></span></button><button id="installBtn" hidden>Install</button></header><nav><button class="tab active" data-tab="home">Home</button><button class="tab" data-tab="songs">Songs</button><button class="tab" data-tab="artists">Artists</button><button class="tab" data-tab="playlists">Playlists</button></nav><main><section id="home" class="page active"><div class="hero"><img id="heroCover" src="assets/logo.png?v=6.1" alt=""><div><p class="eyebrow">Now in rotation</p><h1 id="heroTitle">Kings Music</h1><p id="heroMeta">Tap a song to start listening.</p><button id="playFirst" class="primary">Play</button><button id="shuffleBtn">Shuffle</button></div></div><h2>Recently added</h2><div id="recentList" class="grid"></div></section><section id="songs" class="page"><div class="head"><h1>All Songs</h1><input id="searchInput" placeholder="Search"><select id="sortSelect"><option value="newest">Newest</option><option value="title">Name</option><option value="artist">Artist</option></select></div><div id="songList" class="list"></div></section><section id="artists" class="page"><div class="head"><h1>Artists</h1><select id="artistMode"><option value="any">Any appearance</option><option value="primary">Primary artist only</option></select></div><div id="artistList" class="list"></div><h2 id="artistTitle"></h2><div id="artistSongs" class="list"></div></section><section id="playlists" class="page"><h1>Playlists</h1><button id="sharePlaylist" class="primary">Share Code / Export Code</button><button id="importPlaylist">Import Code</button><button id="clearPlaylist">Clear Playlist</button><textarea id="playlistCode" placeholder="Playlist code appears here, or paste one to import."></textarea><p class="hint">Your playlist saves on this device.</p><div id="playlistList" class="list"></div></section></main></div><aside id="player" hidden><button id="openNowPlaying"><img id="barCover" src="assets/logo.png?v=6.1"><span><b id="barTitle">Not playing</b><small id="barArtist">Choose a song</small></span></button><button id="prevBtn">⏮</button><button id="playBtn">▶</button><button id="nextBtn">⏭</button><input id="seek" type="range" min="0" max="100" value="0"><audio id="audio"></audio></aside><dialog id="nowPlaying"><button id="closeNowPlaying" class="x">×</button><img id="npCover" src="assets/logo.png?v=6.1"><h1 id="npTitle">Not playing</h1><p id="npMeta">Choose a song</p><button id="npPrev">⏮</button><button id="npPlay">▶</button><button id="npNext">⏭</button><br><button id="addCurrent">Add to Playlist</button><button id="toggleLyrics">Lyrics</button><button id="toggleQueue">Queue</button><pre id="lyricsPanel" hidden></pre><div id="queuePanel" hidden></div></dialog><script src="script.js?v=6.1"></script></body></html>
